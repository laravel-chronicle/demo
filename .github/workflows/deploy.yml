name: deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    uses: laravel-chronicle/.github/.github/workflows/build.yml@51438c15798d323d564ae6dad40dbcc2ccb0ca39 # main
    with:
      image: 'ghcr.io/laravel-chronicle/demo'
      dockerfile: './Dockerfile'
      context: '.'

  cleanup:
    needs: [build-and-push]
    uses: laravel-chronicle/.github/.github/workflows/cleanup.yml@b6b15e48589b8d2ac37a1a9c08ec2290c090a93d # main
    with:
      package_name: 'demo'
      package_type: 'container'
      min_versions_to_keep: 3

  ssh-and-pull:
    needs: [build-and-push]
    uses: laravel-chronicle/.github/.github/workflows/pull.yml@ac605f60a368abf37caa7a29890eb48a24fdf170 # main
    with:
      directory: '/home/sites/demo'
    secrets: inherit
