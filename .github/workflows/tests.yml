name: tests

on:
  push:
    branches:
      - develop
      - main
      - filament
  pull_request:
    branches:
      - develop
      - main
      - filament

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 8.5
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Generate Chronicle Encryption Key
        # Crypto-shredding is enabled (CHRONICLE_ENCRYPTION_ENABLED=true) but
        # .env.example ships a blank CHRONICLE_ENCRYPTION_KEY on purpose - a
        # dedicated base64 32-byte KEK must never be committed. Generate a fresh
        # per-run key here so encryption can boot during the suite.
        run: |
          KEY=$(php -r 'echo base64_encode(random_bytes(32));')
          sed -i "s|^CHRONICLE_ENCRYPTION_KEY=.*|CHRONICLE_ENCRYPTION_KEY=${KEY}|" .env

      - name: Generate Chronicle Signing Keys
        # The active key is chronicle-key-2 and both keypairs' material is blank
        # in .env.example on purpose (signing private keys are never committed).
        # Mint two fresh Ed25519 keypairs with the package's own generator so
        # the key ring resolves during the suite. Key IDs are fixed in
        # config/chronicle.php; these env vars only supply the material.
        run: |
          set -euo pipefail
          mint() {
            local out priv pub
            out=$(php artisan chronicle:key:generate)
            priv=$(printf '%s\n' "$out" | sed -n 's/^Private key (base64): //p')
            pub=$(printf '%s\n' "$out" | sed -n 's/^Public key (base64): //p')
            [ -n "$priv" ] && [ -n "$pub" ] || { echo "Failed to parse generated keypair"; exit 1; }
            sed -i "s|^$1=.*|$1=${priv}|" .env
            sed -i "s|^$2=.*|$2=${pub}|" .env
          }
          mint CHRONICLE_PRIVATE_KEY CHRONICLE_PUBLIC_KEY
          mint CHRONICLE_KEY2_PRIVATE_KEY CHRONICLE_KEY2_PUBLIC_KEY

      - name: Build Assets
        run: npm run build

      - name: Run Type Analysis
        run: composer types:check

      - name: Run Tests
        run: php artisan test
