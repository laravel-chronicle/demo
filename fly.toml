# fly.toml app configuration file generated for medledger-demo on 2026-06-11T12:14:07+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'medledger-demo'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_DEBUG = 'false'
  APP_ENV = 'production'
  APP_NAME = 'MedLedger'
  APP_URL = 'https://medledger-demo.fly.dev'
  CACHE_STORE = 'database'
  CHRONICLE_UI_ENABLED = 'true'
  DB_CONNECTION = 'sqlite'
  DB_DATABASE = '/data/database.sqlite'
  LOG_CHANNEL = 'stderr'
  LOG_LEVEL = 'info'
  QUEUE_CONNECTION = 'database'
  SESSION_DRIVER = 'database'

[[mounts]]
  source = 'medledger_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/up'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
